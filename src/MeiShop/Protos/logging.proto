syntax = "proto3";

option csharp_namespace = "LoggingService";

package logging;

// Zentraler gRPC Logging-Service – Client-seitige Proto-Definition
// Diese Datei ist identisch mit der Server-seitigen Definition im LoggingService
service LoggingGrpcService {
  rpc LogError (LogEntry) returns (LogResponse);
  rpc GetLogs (LogFilter) returns (stream LogEntry);
}

message LogEntry {
  string timestamp = 1;
  string service_name = 2;
  string instance_url = 3;
  string error_message = 4;
  string http_status_code = 5;
  int32 retry_attempt = 6;
  string correlation_id = 7;
}

message LogResponse {
  bool success = 1;
  string log_id = 2;
}

message LogFilter {
  string service_name = 1;
  string from_timestamp = 2;
}
